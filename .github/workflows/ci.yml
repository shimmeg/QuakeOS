name: CI

on:
  push:
  pull_request:

jobs:
  macos-build:
    name: macOS unsigned build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Security guards
        run: bash scripts/security-guards.sh

      - name: Build Quake4Mac
        run: >
          xcodebuild
          -project Quake4Mac.xcodeproj
          -scheme Quake4Mac
          -configuration Debug
          -destination 'platform=macOS'
          -derivedDataPath /tmp/quakeos-derived
          CODE_SIGNING_ALLOWED=NO
          build

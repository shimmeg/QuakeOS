<!DOCTYPE html>
<!--
  browser-home.html — Quake4Mac embedded browser "new tab" page.
  A grid of bookmark tiles sized for the 1920×480 panel. Tapping a tile (via the app's
  tap bridge) follows its <a href>. Original implementation.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, initial-scale=1">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1920px;height:480px;background:#070709;color:#f3f4f8;overflow:hidden;
    font-family:-apple-system,"SF Pro Display","Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;}
  .grid{display:grid;grid-template-columns:repeat(6,150px);gap:34px;}
  a.tile{display:flex;flex-direction:column;align-items:center;gap:12px;text-decoration:none;color:#f3f4f8;}
  .ic{width:120px;height:120px;border-radius:28px;background:#15151c;display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(255,255,255,.08);overflow:hidden;}
  .ic img{width:72px;height:72px;}
  .nm{font-size:24px;font-weight:600;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid" id="grid"></div>
  </div>
<script>
  var defaults=[
    {name:"Google",url:"https://www.google.com"},{name:"YouTube",url:"https://www.youtube.com"},
    {name:"Wikipedia",url:"https://www.wikipedia.org"},{name:"Reddit",url:"https://www.reddit.com"},
    {name:"GitHub",url:"https://github.com"},{name:"Maps",url:"https://www.google.com/maps"},
    {name:"News",url:"https://news.google.com"},{name:"Weather",url:"https://weather.com"},
    {name:"Hacker News",url:"https://news.ycombinator.com"},{name:"Amazon",url:"https://www.amazon.com"},
    {name:"Spotify",url:"https://open.spotify.com"},{name:"Twitch",url:"https://www.twitch.tv"}
  ];
  function safeBookmarkURL(u){
    try{
      var parsed = new URL(String(u || ''));
      return (parsed.protocol === 'https:' || parsed.protocol === 'http:') ? parsed.href : null;
    }catch(e){ return null; }
  }
  function host(u){ try{ return new URL(u).hostname; }catch(e){ return ''; } }
  function render(sites){
    var grid = document.getElementById('grid');
    grid.replaceChildren();
    (sites || []).forEach(function(s){
      var safe = safeBookmarkURL(s && s.url);
      var tile = document.createElement('a');
      tile.className = 'tile';
      tile.href = safe || '#';
      if(!safe) tile.setAttribute('aria-disabled', 'true');

      var icon = document.createElement('div');
      icon.className = 'ic';
      var h = safe ? host(s.url) : '';
      if(h){
        var img = document.createElement('img');
        img.src = 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(h) + '&sz=128';
        img.alt = '';
        icon.appendChild(img);
      }

      var name = document.createElement('div');
      name.className = 'nm';
      name.textContent = (s && s.name) ? s.name : 'Untitled';

      tile.appendChild(icon);
      tile.appendChild(name);
      grid.appendChild(tile);
    });
  }
  window.__setBookmarks = function(list){ render(list && list.length ? list : defaults); };
  render(defaults);   // shown until Swift injects the user's list
</script>
</body>
</html>
